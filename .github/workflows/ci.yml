name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: gemriser_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, redis, intl, bcmath, gd
          coverage: pcov

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      - name: Pint
        run: composer pint:test

      - name: PHPStan
        run: composer phpstan

      - name: Pest
        run: composer test:coverage -- --min=70
        env:
          DB_HOST: 127.0.0.1
          DB_DATABASE: gemriser_test
          DB_USERNAME: root
          DB_PASSWORD: secret
